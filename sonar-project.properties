sonar.organization=nhsdigital
sonar.projectKey=NHSDigital_eps-prescription-status-update-api
sonar.host.url=https://sonarcloud.io

# Ignore rule that requires `new Construct` to be assigned to a variable.
# Although this appears to be a useless object creation, in fact
# CDK emits Cloud Formation as a side effect on object creation.
sonar.issue.ignore.multicriteria=cdk_s1848
sonar.issue.ignore.multicriteria.cdk_s1848.ruleKey=typescript:S1848
sonar.issue.ignore.multicriteria.cdk_s1848.resourceKey=packages/cdk/**/*

sonar.coverage.exclusions=\
    **/*.test.*, \
    **/mock*, \
    **/testHelpers.ts, \
    **/testUtils.ts, \
    **/vitest.*.ts, \
    **/cli/*, \
    scripts/*, \
    release.config.js, \
    packages/common/commonTypes

sonar.cpd.exclusions=\
    **/*.test.*, \
    **/mock*, \
    **/testHelpers.ts, \
    **/testUtils.ts, \
    **/vitest.*.ts, \
    **/cli/*, \
    scripts/*, \
    release.config.js, \
    packages/common/commonTypes

sonar.modules=\
    capabilityStatement, \
    checkPrescriptionStatusUpdates, \
    cpsuLambda, \
    gsul, \
    nhsNotifyLambda, \
    nhsNotifyUpdateCallback, \
    psuRestoreValidationLambda, \
    sandbox, \
    statusLambda, \
    updatePrescriptionStatus, \
    middyErrorHandler

